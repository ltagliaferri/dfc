name: Export DFC Mappings to GCS for AI Bundle

on:
  push:
    branches: [ main ]
    paths:
      - 'pkg/dfc/builtin-mappings.yaml'

  schedule:
    - cron: '30 1 * * 0'  # Weekly on Sundays at 1:30 AM

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  export-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Authenticate to Google Cloud
      uses: step-security/google-github-auth@57c51214381a46db0c5776d1b6a5e53be5a326da # v3.0.1
      with:
        workload_identity_provider: "projects/456977358484/locations/global/workloadIdentityPools/chainguard-academy/providers/chainguard-dfc"
        service_account: "github-chainguard-academy@chainguard-academy.iam.gserviceaccount.com"

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c49c431cf1e19c67fe9d6f96ec64e8b52a # v3.0.1

    - name: Prepare DFC mappings export
      env:
        GH_SHA: ${{ github.sha }}
        GH_REF: ${{ github.ref }}
        GH_EVENT: ${{ github.event_name }}
      run: |
        set -euo pipefail

        EXPORT_DIR=$(mktemp -d)
        trap "rm -rf $EXPORT_DIR" EXIT

        echo "Collecting DFC builtin mappings..."

        if [ -f "pkg/dfc/builtin-mappings.yaml" ]; then
          cp pkg/dfc/builtin-mappings.yaml "$EXPORT_DIR/"
          echo "✓ Copied builtin-mappings.yaml"
        else
          echo "Error: pkg/dfc/builtin-mappings.yaml not found"
          exit 1
        fi

        # Create metadata file
        cat > "$EXPORT_DIR/metadata.json" << EOF
        {
          "repository": "chainguard-dev/dfc",
          "export_time": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "commit": "$GH_SHA",
          "ref": "$GH_REF",
          "triggered_by": "$GH_EVENT",
          "files_count": 1
        }
        EOF

        python3 -m json.tool "$EXPORT_DIR/metadata.json" > /dev/null

        cd "$(dirname "$EXPORT_DIR")"
        tar --owner=0 --group=0 --mode='u+rwX,go+rX,go-w' \
            -czf /tmp/docs-export.tar.gz "$(basename "$EXPORT_DIR")"

        echo "DFC mappings export created:"
        ls -lh /tmp/docs-export.tar.gz

    - name: Upload to GCS
      run: |
        set -euo pipefail

        echo "Uploading DFC mappings to GCS..."

        gcloud storage cp /tmp/docs-export.tar.gz \
          "gs://academy-all-docs/dfc/docs-export.tar.gz" \
          --project=chainguard-academy \
          --content-type="application/gzip" \
          --cache-control="no-cache"

        # Extract for metadata upload
        EXPORT_DIR=$(mktemp -d)
        trap "rm -rf $EXPORT_DIR" EXIT
        tar -xzf /tmp/docs-export.tar.gz -C "$EXPORT_DIR" --strip-components=1

        gcloud storage cp "$EXPORT_DIR/metadata.json" \
          "gs://academy-all-docs/dfc/metadata.json" \
          --project=chainguard-academy \
          --content-type="application/json" \
          --cache-control="no-cache"

        echo "✓ Successfully uploaded DFC mappings to GCS"

    - name: Trigger compilation workflow
      if: github.event_name == 'push' || github.event_name == 'schedule'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        GH_SHA: ${{ github.sha }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.repos.createDispatchEvent({
            owner: 'chainguard-dev',
            repo: 'edu',
            event_type: 'ai-docs-source-updated',
            client_payload: {
              repository: 'chainguard-dev/dfc',
              commit: process.env.GH_SHA,
              source: 'dfc'
            }
          });

          console.log('Triggered AI docs compilation workflow');
